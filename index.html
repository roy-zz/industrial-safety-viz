<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>화공안전지도사 3차 면접 — 토픽 도식</title>
<style>
  /* 다크 테마 고정 */
  :root{
    --bg:#0f1217; --panel:#171b22; --ink:#e6e8ec; --muted:#9aa3b2;
    --line:#262b34; --accent:#60a5fa; --accent-soft:#1e293b; --hover:#1d222b;
    --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",
      "Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%;
  }
  /* ===== layout ===== */
  header{
    position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  header h1{font-size:15px; margin:0; font-weight:700; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis}
  header .sub{color:var(--muted); font-size:12px; margin-left:2px}
  #menuBtn{display:none; background:none; border:1px solid var(--line); border-radius:8px;
    color:var(--ink); font-size:18px; width:38px; height:38px; cursor:pointer}
  #search{
    flex:1; max-width:320px; margin-left:auto; padding:8px 12px; border:1px solid var(--line);
    border-radius:10px; background:var(--bg); color:var(--ink); font-size:13px; outline:none;
  }
  #search:focus{border-color:var(--accent)}
  .wrap{display:flex; min-height:calc(100% - 57px)}
  nav{
    width:280px; flex:none; background:var(--panel); border-right:1px solid var(--line);
    padding:12px 8px 60px; overflow-y:auto; height:calc(100vh - 57px); position:sticky; top:57px;
  }
  .cat{margin-bottom:4px}
  .cat > button{
    width:100%; text-align:left; background:none; border:none; color:var(--ink);
    font-size:13.5px; font-weight:600; padding:9px 10px; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .cat > button:hover{background:var(--hover)}
  .cat .badge{margin-left:auto; font-size:11px; color:var(--muted); font-weight:500}
  .cat .arrow{font-size:10px; color:var(--muted); transition:transform .15s}
  .cat.collapsed .arrow{transform:rotate(-90deg)}
  .cat.collapsed .topics{display:none}
  .topics{padding:2px 0 6px 8px}
  .topics a{
    display:block; padding:7px 10px 7px 22px; font-size:13px; color:var(--muted);
    text-decoration:none; border-radius:7px; border-left:2px solid transparent;
  }
  .topics a:hover{background:var(--hover); color:var(--ink)}
  .topics a.active{color:var(--accent); background:var(--accent-soft);
    border-left-color:var(--accent); font-weight:600}
  main{flex:1; min-width:0; padding:24px clamp(16px,4vw,48px) 80px; overflow-x:hidden}
  /* ===== content ===== */
  #content{max-width:900px; margin:0 auto}
  #content h1{font-size:24px; border-bottom:2px solid var(--line); padding-bottom:10px}
  #content h2{font-size:18px; margin-top:32px; color:var(--accent)}
  #content h3{font-size:15px; margin-top:22px}
  #content blockquote{
    margin:10px 0; padding:8px 14px; border-left:3px solid var(--accent);
    background:var(--accent-soft); border-radius:0 8px 8px 0; color:var(--ink); font-size:13.5px;
  }
  #content code{background:var(--hover); padding:2px 5px; border-radius:5px; font-size:13px}
  #content table{border-collapse:collapse; width:100%; margin:14px 0; font-size:13px}
  #content th,#content td{border:1px solid var(--line); padding:7px 10px; text-align:left}
  #content th{background:var(--hover)}
  .mermaid{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:18px; margin:18px 0; text-align:center; overflow-x:auto;
  }
  .home-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; margin-top:20px}
  .home-card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px;
    text-decoration:none; color:var(--ink); box-shadow:var(--shadow); transition:transform .12s,border-color .12s;
  }
  .home-card:hover{transform:translateY(-2px); border-color:var(--accent)}
  .home-card .n{font-size:12px; color:var(--accent); font-weight:700}
  .home-card .t{font-size:14px; font-weight:600; margin:6px 0 2px}
  .home-card .c{font-size:12px; color:var(--muted)}
  .empty{color:var(--muted); font-size:13px; padding:6px 10px}
  /* ===== 접이식 문항 ===== */
  .qbar{display:flex; gap:8px; margin:6px 0 14px}
  .qbar button{font-size:12px; padding:6px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--panel); color:var(--ink); cursor:pointer}
  .qbar button:hover{border-color:var(--accent); color:var(--accent)}
  details.qitem{border:1px solid var(--line); border-radius:10px; margin:10px 0; background:var(--panel)}
  details.qitem > summary{cursor:pointer; padding:12px 16px; font-weight:600; font-size:14px;
    list-style:none; display:flex; gap:8px; align-items:flex-start}
  details.qitem > summary::-webkit-details-marker{display:none}
  details.qitem > summary::before{content:'▸'; color:var(--accent); font-size:12px; margin-top:2px;
    flex:none; transition:transform .15s}
  details.qitem[open] > summary::before{transform:rotate(90deg)}
  details.qitem[open] > summary{border-bottom:1px solid var(--line); background:var(--hover);
    border-radius:10px 10px 0 0}
  details.qitem > :not(summary){padding-left:16px; padding-right:16px}
  details.qitem > :not(summary):last-child{padding-bottom:14px; margin-bottom:0}
  details.qitem h3{display:none}
  .qmeta{font-size:12px !important; color:var(--muted); margin:8px 0 0 !important;
    padding-top:8px !important; padding-bottom:8px !important}
  .qmeta code{font-size:11px}
  blockquote.has-mnemonic{border-left-color:#f59e0b !important;
    background:rgba(245,158,11,.13) !important}
  blockquote.has-trap{border-left-color:#ef4444 !important;
    background:rgba(239,68,68,.10) !important}
  blockquote.has-link{border-left-color:#10b981 !important;
    background:rgba(16,185,129,.10) !important; font-size:12.5px}
  /* ===== 도식 / 전체문항 탭 ===== */
  .tabbtns{display:flex; gap:4px; border-bottom:2px solid var(--line); margin:14px 0 18px;
    position:sticky; top:57px; background:var(--bg); z-index:10}
  .tab{background:none; border:none; padding:11px 20px; font-size:14.5px; font-weight:700;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent)}
  .panel.hidden{display:none}
  .panel > h2:first-child{display:none}   /* 탭 라벨이 대신함 */
  /* ===== 인포그래픽 카드 ===== */
  .info-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px; margin:6px 0 22px}
  .info-card{border-radius:12px; padding:14px 16px; color:#fff; box-shadow:var(--shadow)}
  .info-card h4{margin:0 0 8px; font-size:14px; font-weight:700}
  .info-card ul{margin:0; padding-left:18px; font-size:12.5px; line-height:1.55}
  .info-card .mnem{display:inline-block; font-size:11px; background:rgba(255,255,255,.25);
    padding:3px 9px; border-radius:11px; margin-top:10px; font-weight:700}
  /* ===== 인터랙티브 마인드맵 (Markmap) ===== */
  .mapwrap{position:relative; border:1px solid var(--line); border-radius:12px; background:var(--panel);
    margin:10px 0 8px; overflow:hidden}
  .mapwrap .markmap{height:min(72vh,560px)}
  .mapwrap .markmap > svg{width:100%; height:100%}
  /* 마인드맵 다크 가독성: 라벨(foreignObject div) 밝게, 가지선·접기원 밝게 */
  .mapwrap .markmap text{fill:#e6e8ec !important}
  .mapwrap .markmap foreignObject{color:#e6e8ec}
  .mapwrap .markmap foreignObject div{color:#e6e8ec !important}
  .mapwrap .markmap foreignObject code{background:#0b0e13; color:#fca5a5}
  .mapwrap .markmap a{color:#93c5fd !important}
  .mapwrap .markmap circle{stroke:#cbd5e1; fill:#171b22}
  .mapwrap .markmap .markmap-link{stroke-opacity:.9}
  .maphint{font-size:11.5px; color:var(--muted); margin:0 0 18px; padding-left:2px}
  #scrim{display:none; position:fixed; inset:57px 0 0; background:rgba(0,0,0,.4); z-index:20}
  footer{color:var(--muted); font-size:12px; text-align:center; margin-top:40px; padding-top:16px;
    border-top:1px solid var(--line)}
  @media (max-width:768px){
    #menuBtn{display:block}
    nav{position:fixed; left:0; top:57px; z-index:25; transform:translateX(-100%);
      transition:transform .2s; box-shadow:var(--shadow)}
    nav.open{transform:translateX(0)}
    #scrim.open{display:block}
    #search{max-width:none}
    header h1 .sub{display:none}
  }
</style>
</head>
<body>
<header>
  <button id="menuBtn" aria-label="메뉴">☰</button>
  <h1>화공안전 3차 도식<span class="sub"> · 면접 토픽 시각화</span></h1>
  <input id="search" type="search" placeholder="토픽 검색…" autocomplete="off">
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main><div id="content"></div></main>
</div>
<div id="scrim"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>window.markmap={autoLoader:{manual:true}};</script>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18"></script>
<script>
const dark = true;  // 다크 테마 고정
mermaid.initialize({startOnLoad:false, theme: dark?'dark':'default', securityLevel:'loose',
  flowchart:{useMaxWidth:true, htmlLabels:true}, themeVariables:{fontSize:'14px'}});
marked.setOptions({breaks:true, gfm:true});

// 본문 후처리: blockquote 색상분류 + ### Q 문항 접이식 변환
function enhance(root){
  root.querySelectorAll('blockquote').forEach(bq=>{
    const t=bq.textContent;
    if(t.includes('💡')) bq.classList.add('has-mnemonic');
    else if(t.includes('함정(❌)')||t.includes('❌')) bq.classList.add('has-trap');
    else if(t.includes('🔗')) bq.classList.add('has-link');
  });
  root.querySelectorAll('p').forEach(p=>{
    if(/^【(빈출|근거)/.test(p.textContent.trim())) p.classList.add('qmeta');
  });
  const kids=[...root.children]; let i=0;
  while(i<kids.length){
    const el=kids[i];
    if(el.tagName==='H3' && /^Q\d+-\d+/.test(el.textContent.trim())){
      const det=document.createElement('details'); det.className='qitem';
      const sum=document.createElement('summary');
      sum.textContent=el.textContent.trim();
      det.appendChild(sum);
      let j=i+1;
      while(j<kids.length && !['H2','H3'].includes(kids[j].tagName)){ det.appendChild(kids[j]); j++; }
      root.replaceChild(det, el);
      i=j;
    } else i++;
  }
}

// 마인드맵 지연 렌더 (숨김 패널에서 렌더하면 0크기가 되므로 보일 때 렌더)
let mapsRendered=false;
async function renderMaps(){
  if(mapsRendered) return;
  if(window.markmap?.autoLoader && content.querySelector('.markmap')){
    mapsRendered=true;
    try{ await markmap.autoLoader.renderAllUnder(content); }catch(e){ console.error('markmap', e); }
  }
}

// 도식 / 전체문항 2탭 분리 — 기본 노출은 '전체 문항'
function buildTabs(){
  const h2s=[...content.querySelectorAll(':scope > h2')];
  const diagH2=h2s.find(h=>/도식|한눈에/.test(h.textContent));
  const listH2=h2s.find(h=>/전체 문항/.test(h.textContent));
  if(!diagH2 || !listH2) return;
  const tabs=document.createElement('div');
  tabs.innerHTML='<div class="tabbtns">'+
    '<button class="tab active" data-p="1">📋 전체 문항</button>'+
    '<button class="tab" data-p="0">📊 도식</button></div>'+
    '<div class="panel hidden" data-p="0"></div><div class="panel" data-p="1"></div>';
  content.insertBefore(tabs, diagH2);
  const p0=tabs.querySelector('.panel[data-p="0"]');
  const p1=tabs.querySelector('.panel[data-p="1"]');
  let n=diagH2; while(n && n!==listH2){ const nx=n.nextSibling; p0.appendChild(n); n=nx; }
  n=listH2;   while(n){ const nx=n.nextSibling; p1.appendChild(n); n=nx; }
  tabs.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{
    tabs.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b===btn));
    tabs.querySelectorAll('.panel').forEach(pp=>pp.classList.toggle('hidden', pp.dataset.p!==btn.dataset.p));
    if(btn.dataset.p==='0') renderMaps();   // 도식 처음 열 때 마인드맵 렌더
  });
}

const nav = document.getElementById('nav');
const content = document.getElementById('content');
const search = document.getElementById('search');
let MANIFEST = {categories:[]};
let FLAT = []; // {catId,catName,id,title,file}

function slug(s){return encodeURIComponent(s);}

async function boot(){
  try{
    MANIFEST = await (await fetch('manifest.json?_='+Date.now())).json();
  }catch(e){ content.innerHTML='<p class="empty">manifest.json을 불러오지 못했습니다.</p>'; return; }
  FLAT = [];
  MANIFEST.categories.forEach(c => (c.topics||[]).forEach(t =>
    FLAT.push({catId:c.id, catName:c.name, ...t})));
  buildNav();
  route();
}

function buildNav(filter=''){
  nav.innerHTML='';
  const f = filter.trim().toLowerCase();
  MANIFEST.categories.forEach(c=>{
    const topics = (c.topics||[]).filter(t =>
      !f || t.title.toLowerCase().includes(f) || c.name.toLowerCase().includes(f));
    if(f && topics.length===0) return;
    const div=document.createElement('div'); div.className='cat'+(f?'':'');
    const total=(c.topics||[]).length;
    div.innerHTML=`<button><span class="arrow">▼</span>${c.id}. ${c.name}`+
      `<span class="badge">${total?total+'도식':'준비중'}</span></button>`;
    const list=document.createElement('div'); list.className='topics';
    if(topics.length===0){ list.innerHTML='<div class="empty">준비중</div>'; }
    topics.forEach(t=>{
      const a=document.createElement('a'); a.href='#'+slug(t.id);
      a.textContent=t.title; a.dataset.id=t.id; list.appendChild(a);
    });
    div.appendChild(list);
    div.querySelector('button').onclick=()=>div.classList.toggle('collapsed');
    nav.appendChild(div);
  });
}

function home(){
  let html='<h1>화공안전지도사 3차 면접 — 토픽 도식</h1>'+
    '<p style="color:var(--muted)">흩어진 면접 문항을 토픽별 다이어그램으로 묶었습니다. '+
    '왼쪽에서 토픽을 고르거나 아래 카드를 누르세요.</p><div class="home-grid">';
  FLAT.forEach(t=>{
    html+=`<a class="home-card" href="#${slug(t.id)}">`+
      `<div class="n">${t.catId}. ${t.catName}</div>`+
      `<div class="t">${t.title}</div>`+
      `<div class="c">${t.desc||''}</div></a>`;
  });
  html+='</div><footer>산업안전보건기준에 관한 규칙·KOSHA·고시 원문 기준 · 학습용</footer>';
  content.innerHTML=html;
}

async function render(id){
  const t = FLAT.find(x=>x.id===id);
  if(!t){ home(); return; }
  content.innerHTML='<p class="empty">불러오는 중…</p>';
  let md;
  try{ md = await (await fetch(t.file+'?_='+Date.now())).text(); }
  catch(e){ content.innerHTML='<p class="empty">문서를 불러오지 못했습니다.</p>'; return; }
  // marked → html, then convert mermaid code blocks to <pre class="mermaid">
  let html = marked.parse(md);
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  tmp.querySelectorAll('code.language-mermaid').forEach(code=>{
    const pre=document.createElement('pre'); pre.className='mermaid';
    pre.textContent=code.textContent; code.closest('pre').replaceWith(pre);
  });
  // ```cards (JSON) → 인포그래픽 카드
  const CARDCOL={rule:'#2563eb',kosha:'#059669',num:'#7c3aed',mnem:'#f59e0b',trap:'#dc2626',exempt:'#6b7280'};
  tmp.querySelectorAll('code.language-cards').forEach(code=>{
    let cards=[]; try{ cards=JSON.parse(code.textContent); }catch(e){ return; }
    const grid=document.createElement('div'); grid.className='info-grid';
    cards.forEach(c=>{
      const d=document.createElement('div'); d.className='info-card';
      d.style.background=CARDCOL[c.color]||'#2563eb';
      if(c.color==='mnem') d.style.color='#111';
      d.innerHTML=`<h4>${c.title||''}</h4><ul>${(c.items||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`+
        (c.mnemonic?`<span class="mnem">💡 ${c.mnemonic}</span>`:'');
      grid.appendChild(d);
    });
    code.closest('pre').replaceWith(grid);
  });
  // ```markmap → 인터랙티브 마인드맵 컨테이너
  tmp.querySelectorAll('code.language-markmap').forEach(code=>{
    const wrap=document.createElement('div'); wrap.className='mapwrap';
    const mm=document.createElement('div'); mm.className='markmap';
    const tpl=document.createElement('script'); tpl.type='text/template'; tpl.textContent=code.textContent;
    mm.appendChild(tpl); wrap.appendChild(mm);
    code.closest('pre').replaceWith(wrap);
  });
  enhance(tmp);
  content.replaceChildren(...tmp.childNodes);
  // 접이식 문항이 있으면 전체 펼치기/접기 툴바 삽입
  const items=content.querySelectorAll('details.qitem');
  if(items.length){
    const bar=document.createElement('div'); bar.className='qbar';
    bar.innerHTML=`<button id="openAll">▾ 전체 펼치기 (${items.length})</button>`+
      `<button id="closeAll">▸ 전체 접기</button>`;
    const anchor=[...content.children].find(c=>c.tagName==='H2' &&
      c.textContent.includes('전체 문항')) || content.firstChild;
    anchor.insertAdjacentElement('afterend', bar);
    bar.querySelector('#openAll').onclick=()=>items.forEach(d=>d.open=true);
    bar.querySelector('#closeAll').onclick=()=>items.forEach(d=>d.open=false);
  }
  try{ await mermaid.run({nodes: content.querySelectorAll('.mermaid')}); }catch(e){}
  mapsRendered=false;
  buildTabs();
  // 마인드맵이 지금 보이는 상태면(탭 없음/도식이 기본) 즉시 렌더, 아니면 도식 탭 열 때 렌더
  const mm=content.querySelector('.markmap');
  if(mm && mm.offsetParent!==null) renderMaps();
  content.scrollIntoView({block:'start'});
  // active state
  nav.querySelectorAll('.topics a').forEach(a=>a.classList.toggle('active', a.dataset.id===id));
}

function route(){
  const id = decodeURIComponent(location.hash.replace(/^#/,''));
  closeNav();
  if(!id){ home(); nav.querySelectorAll('.topics a').forEach(a=>a.classList.remove('active')); }
  else render(id);
}

/* mobile nav */
const scrim=document.getElementById('scrim');
function openNav(){nav.classList.add('open');scrim.classList.add('open');}
function closeNav(){nav.classList.remove('open');scrim.classList.remove('open');}
document.getElementById('menuBtn').onclick=()=>nav.classList.contains('open')?closeNav():openNav();
scrim.onclick=closeNav;

search.addEventListener('input',()=>buildNav(search.value));
window.addEventListener('hashchange',route);
boot();
</script>
</body>
</html>
